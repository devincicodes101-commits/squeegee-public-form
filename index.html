<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Get Your Free Squeegee Squad LA Estimate</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1>Get Your Free Estimate</h1>
        <p>Tell us about your project. We'll send you a preliminary estimate range right away.</p>
      </header>

      <form id="estimate-form" novalidate>
        <fieldset>
          <legend>Contact</legend>

          <label>
            <span>Full Name <em>*</em></span>
            <input type="text" name="Full Name" required autocomplete="name" />
          </label>

          <label>
            <span>Email <em>*</em></span>
            <input type="email" name="Email" required autocomplete="email" />
          </label>

          <label>
            <span>Phone Number <em>*</em></span>
            <input type="tel" name="Phone Number" required autocomplete="tel" inputmode="numeric" />
          </label>
        </fieldset>

        <fieldset>
          <legend>Property</legend>

          <label>
            <span>ZIP Code <em>*</em></span>
            <input type="number" name="ZIP Code" required placeholder="90046" autocomplete="postal-code" />
          </label>

          <label>
            <span>Property Address <small>(optional)</small></span>
            <input type="text" name="Property Address (optional)" autocomplete="street-address" />
          </label>

          <label>
            <span>Property Type <em>*</em></span>
            <select name="Property Type" required>
              <option value="" disabled selected>Select…</option>
              <option>Residential</option>
              <option>Commercial</option>
              <option>HOA/Multi-Unit</option>
              <option>Premium/Luxury</option>
            </select>
          </label>
        </fieldset>

        <fieldset>
          <legend>Service</legend>

          <label>
            <span>Service <em>*</em></span>
            <select name="Service" required>
              <option value="" disabled selected>Select a service…</option>
              <option>Residential Window Cleaning</option>
              <option>Large/Luxury Residential Windows</option>
              <option>Commercial Window Cleaning</option>
              <option>High-Access/Lift Window Cleaning</option>
              <option>Storefront Glass Cleaning</option>
              <option>Recurring Storefront Glass</option>
              <option>Residential Pressure Washing</option>
              <option>Commercial Pressure Washing</option>
              <option>Common Area Pressure Washing</option>
              <option>Building Washing / Soft Washing</option>
              <option>Sidewalks / Lots / Walkways</option>
              <option>Oil Stain Removal / Degreasing</option>
              <option>Graffiti Removal</option>
              <option>Slip Hazard Removal</option>
              <option>Awning Cleaning</option>
              <option>Solar Panel Cleaning</option>
              <option>Gutter Cleaning</option>
              <option>Loading Dock Cleaning</option>
              <option>Warehouse Cleaning</option>
              <option>Tennis / Specialty Surface Cleaning</option>
              <option>Kitchen Hood Cleaning</option>
              <option>Dog Park / Turf Cleaning</option>
              <option>Parking Garage Deep Cleaning</option>
              <option>Junk Removal</option>
              <option>Large Junk Removal</option>
              <option>Eviction / Turnover Cleanouts</option>
              <option>Property Cleanouts</option>
              <option>Post-Construction Cleanup</option>
              <option>Dumpster Pad Sanitization</option>
              <option>Trash Area Cleaning</option>
              <option>Trash Chute Cleaning</option>
              <option>Odor / Bacteria Treatment</option>
            </select>
          </label>

          <label>
            <span>Quantity <em>*</em> <small>(panes, sq ft, panels, linear ft, loads — depends on service)</small></span>
            <input
              type="number"
              name="Quantity (panes / sq ft / linear ft / panels / loads — depends on service)"
              required
              min="1"
            />
          </label>

          <label>
            <span>Condition <em>*</em></span>
            <select name="Condition" required>
              <option value="" disabled selected>Select…</option>
              <option>Standard</option>
              <option>Moderate buildup/staining</option>
              <option>Heavy buildup/staining</option>
              <option>Severe/restoration</option>
            </select>
          </label>

          <label>
            <span>Access <em>*</em></span>
            <select name="Access" required>
              <option value="" disabled selected>Select…</option>
              <option>Easy</option>
              <option>Moderate</option>
              <option>Difficult</option>
              <option>Height/Lift/Rope</option>
            </select>
          </label>

          <label>
            <span>Urgency <em>*</em></span>
            <select name="Urgency" required>
              <option value="" disabled selected>Select…</option>
              <option>Standard</option>
              <option>Same-week/Rush</option>
              <option>Night/Weekend</option>
            </select>
          </label>

          <label>
            <span>LA Logistics <small>(optional)</small></span>
            <select name="LA Logistics">
              <option value="" selected>Skip</option>
              <option>None/Route-friendly</option>
              <option>Paid Parking/Loading</option>
              <option>DTLA/Dense Access</option>
              <option>Water Runoff/Containment</option>
              <option>Special Handling</option>
            </select>
          </label>

          <label>
            <span>Recurring <small>(optional)</small></span>
            <select name="Recurring">
              <option value="" selected>Skip</option>
              <option>One-Time</option>
              <option>Monthly After First Clean</option>
              <option>Quarterly After First Clean</option>
            </select>
          </label>
        </fieldset>

        <fieldset>
          <legend>Photos &amp; notes</legend>

          <label>
            <span>Photos <small>(optional — upload for a more accurate estimate)</small></span>
            <input
              type="file"
              name="Photos (optional — upload for a more accurate estimate)"
              accept="image/*"
              multiple
            />
            <small class="muted">Skip and still receive a preliminary estimate.</small>
          </label>

          <label>
            <span>Project Notes <small>(optional)</small></span>
            <textarea name="Project Notes (optional)" rows="3" placeholder="Anything else we should know?"></textarea>
          </label>
        </fieldset>

        <button type="submit" id="submit-btn">Get my estimate</button>
        <p class="muted disclaimer">
          This is not a final quote. Final pricing may vary based on access, condition, photos, and team review.
        </p>
      </form>

      <section id="result" class="result hidden" aria-live="polite"></section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
